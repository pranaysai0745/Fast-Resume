<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FastResume — Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ Global site styles -->
  <link rel="stylesheet" href="/style.css">

  <!-- ✅ Builder-only styles -->
  <style>
    :root{
      --accent:#2563eb;
      --accent-2:#7c3aed;
      --border:#e5e7eb;
      --muted:#6b7280;
      --card:#ffffff;
    }

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:linear-gradient(135deg,#eef2ff,#fafafa);
    }

    .builder-shell{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .cards-row{
      display:grid;
      grid-template-columns:1fr 1.1fr;
      gap:24px;
      margin-top:20px;
    }

    .left,.right{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
    }

    textarea,input,select{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:9px;
      margin-bottom:10px;
      font-size:14px;
    }

    .template-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:10px;
    }

    .template-card{
      border:2px solid transparent;
      padding:12px;
      border-radius:14px;
      cursor:pointer;
      background:#f9fafb;
      text-align:center;
      font-size:13px;
    }

    .template-card.active{
      border-color:var(--accent);
      background:#ffffff;
      box-shadow:0 10px 30px rgba(37,99,235,.25);
    }

    .resume{
      background:#ffffff;
      border-radius:14px;
      padding:22px;
      min-height:520px;
      border:1px solid var(--border);
    }

    .btn-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    button{
      border:none;
      padding:10px 18px;
      border-radius:999px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:white;
    }

    .btn-outline{
      border:1px solid var(--border);
      background:white;
    }

    @media(max-width:900px){
      .cards-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <div class="nav-logo">FR</div>
      <div>
        <div class="nav-title">FastResume</div>
        <div class="nav-subtitle">AI resumes for students</div>
      </div>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/builder">Builder</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</header>

<main class="builder-shell">
  <h2>FastResume — Auto-build</h2>
  <p class="muted">Paste details → Choose template → Download PDF</p>

  <div class="cards-row">
    <!-- LEFT -->
    <div class="left">
      <label>About You</label>
      <textarea id="story"></textarea>

      <label>Experience</label>
      <select id="exp">
        <option>Fresher / Student</option>
        <option>0–2 years</option>
        <option>2+ years</option>
      </select>

      <h4>Choose Template</h4>
      <div class="template-grid">
        <div class="template-card active" data-t="classic">Classic</div>
        <div class="template-card" data-t="sidebar">Sidebar</div>
        <div class="template-card" data-t="balanced">Balanced</div>
        <div class="template-card" data-t="modern">Modern</div>
        <div class="template-card" data-t="photo">Photo</div>
        <div class="template-card" data-t="bold">Bold</div>
      </div>

      <div class="btn-row">
        <button class="btn-primary">Auto Build</button>
        <button class="btn-outline">Demo</button>
        <button class="btn-outline">Print / PDF</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="resume">
        <h3>Your Resume Preview</h3>
        <p class="muted">Live preview will appear here</p>
      </div>
    </div>
  </div>
</main>

</body>
</html>
