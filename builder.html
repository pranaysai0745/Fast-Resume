<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FastResume — Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== BASE ===== */
:root{--accent:#2563eb;--accent2:#a855f7;--border:#e5e7eb;--muted:#6b7280}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,sans-serif;
background:radial-gradient(circle at top left,#e0f2fe,#f5e9ff 55%,#fdf2ff);
color:#0f172a;
}
.hide{display:none}

/* ===== NAV ===== */
.nav{position:sticky;top:0;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:auto;padding:10px 18px;display:flex;justify-content:space-between}
.nav a{text-decoration:none;color:#374151;font-size:13px}
.nav .cta{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:8px 18px;border-radius:999px}

/* ===== INTRO ===== */
.intro-shell{
max-width:1200px;margin:auto;padding:40px 16px;
display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:center
}
.btn-primary{
background:linear-gradient(135deg,var(--accent),var(--accent2));
border:0;border-radius:999px;padding:12px 24px;color:#fff;font-weight:600;cursor:pointer
}

/* ===== BUILDER ===== */
.builder-shell{max-width:1200px;margin:auto;padding:24px 16px}
.cards-row{display:flex;gap:20px}
.left,.right{
background:#fff;border-radius:18px;padding:18px;
border:1px solid var(--border)
}
.left{width:46%}
.right{width:54%;position:relative;background:#f8fafc}

/* ===== ERROR ===== */
.error-box{
background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d;
padding:8px 10px;border-radius:8px;font-size:13px;margin-bottom:10px
}

/* ===== LOADER ===== */
.loading{
position:absolute;inset:0;background:rgba(255,255,255,.85);
display:flex;align-items:center;justify-content:center;z-index:20
}
.loader-card{
background:#fff;padding:24px;border-radius:16px;
width:260px;text-align:center;border:1px solid var(--border)
}
.skeleton{
height:120px;border-radius:10px;
background:linear-gradient(90deg,#eee,#ddd,#eee);
background-size:400% 100%;
animation:shimmer 1.2s infinite
}
@keyframes shimmer{0%{background-position:100%}100%{background-position:-100%}}

/* ===== TEMPLATE CARDS ===== */
.template-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.template-card{
border:2px solid transparent;padding:10px;border-radius:14px;
background:#f9fafb;cursor:pointer
}
.template-card.active{
border-color:var(--accent);
background:#fff
}

/* ===== RESUME ===== */
.resume{
background:#fff;border-radius:14px;border:1px solid var(--border);
padding:22px;min-height:420px
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.intro-shell,.cards-row{grid-template-columns:1fr;flex-direction:column}
.left,.right{width:100%}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="nav-inner">
<b>FastResume</b>
<div>
<a href="/">Home</a> &nbsp;
<a href="/builder" class="cta">Start free</a>
</div>
</div>
</div>

<!-- INTRO -->
<section id="introStep" class="intro-shell">
<div>
<h1>Build your AI resume<br>in minutes</h1>
<p>No login • No payment • For students</p>
<button id="startBtn" class="btn-primary">Start the builder</button>
</div>
<div>
<div style="background:#020617;color:#fff;padding:20px;border-radius:20px">
AI resume preview
</div>
</div>
</section>

<!-- BUILDER -->
<main id="builderStep" class="builder-shell hide">
<div class="cards-row">

<!-- LEFT -->
<div class="left">
<div id="error" class="error-box hide"></div>

<textarea id="story" placeholder="Paste about yourself"></textarea>

<h4 style="margin-top:14px">Choose template</h4>
<div class="template-grid">
<div class="template-card active" data-tpl="classic">Classic</div>
<div class="template-card" data-tpl="softSidebar">Soft Sidebar</div>
<div class="template-card" data-tpl="balanced">Balanced</div>
<div class="template-card" data-tpl="modernLine">Modern</div>
<div class="template-card" data-tpl="photoSidebar">Photo</div>
<div class="template-card" data-tpl="boldHeader">Bold</div>
</div>

<br>
<button id="buildBtn" class="btn-primary">Auto Build</button>
</div>

<!-- RIGHT -->
<div class="right">
<div id="loading" class="loading hide">
<div class="loader-card">
<div class="skeleton"></div>
<p>AI building your resume…</p>
</div>
</div>

<div id="resume" class="resume">
<h2>Your Name</h2>
<p>Your resume preview will appear here.</p>
</div>
</div>

</div>
</main>

<script>
const intro=document.getElementById('introStep');
const builder=document.getElementById('builderStep');
const startBtn=document.getElementById('startBtn');
const errorBox=document.getElementById('error');
const loading=document.getElementById('loading');
const resume=document.getElementById('resume');
const story=document.getElementById('story');
const buildBtn=document.getElementById('buildBtn');
const cards=[...document.querySelectorAll('.template-card')];

let template='classic';

/* START */
startBtn.onclick=()=>{
intro.classList.add('hide');
builder.classList.remove('hide');
window.scrollTo(0,0);
}

/* TEMPLATE SELECT */
cards.forEach(c=>{
c.onclick=()=>{
cards.forEach(x=>x.classList.remove('active'));
c.classList.add('active');
template=c.dataset.tpl;
}
});

/* AUTO BUILD */
buildBtn.onclick=async()=>{
if(!story.value.trim()){
errorBox.textContent='Please paste something about yourself.';
errorBox.classList.remove('hide');
return;
}
errorBox.classList.add('hide');
loading.classList.remove('hide');
buildBtn.disabled=true;

setTimeout(()=>{
resume.innerHTML=`
<h2>Generated Resume</h2>
<p>Template: ${template}</p>
<p>${story.value}</p>
`;
loading.classList.add('hide');
buildBtn.disabled=false;
},1800);
};
</script>

</body>
</html>
