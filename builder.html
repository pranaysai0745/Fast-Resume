<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FastResume — Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(135deg,#e0f2fe,#f5e9ff);
  color:#0f172a;
}
.hide{display:none}

/* NAV */
.nav{
  background:rgba(255,255,255,.95);
  border-bottom:1px solid #e5e7eb;
}
.nav-inner{
  max-width:1200px;
  margin:auto;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.nav a{text-decoration:none}
.logo{
  font-weight:800;
  display:flex;
  gap:8px;
  align-items:center;
}
.logo span{
  background:#2563eb;
  color:white;
  width:32px;height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}
.nav-links a{
  margin-left:20px;
  color:#374151;
  font-weight:500;
}
.nav-links .cta{
  background:#2563eb;
  color:white;
  padding:8px 16px;
  border-radius:999px;
}

/* SECTIONS */
.section{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* INTRO */
.hero h1{
  font-size:38px;
  margin-bottom:10px;
}
.hero p{color:#4b5563}
.hero button{
  margin-top:20px;
  padding:14px 28px;
  font-size:16px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:999px;
  cursor:pointer;
}

/* FORM */
.card{
  background:white;
  padding:24px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.1);
  margin-bottom:20px;
}
label{
  font-weight:600;
  margin-top:14px;
  display:block;
}
input,textarea,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:14px;
}
textarea{min-height:90px}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}
.actions button{
  padding:12px 18px;
  border-radius:999px;
  border:none;
  font-weight:600;
  cursor:pointer;
}
.primary{background:#2563eb;color:white}
.ghost{background:#eef2ff}
.outline{border:1px solid #d1d5db;background:white}

/* TEMPLATE GRID */
.templates{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:14px;
}
.template{
  background:#f9fafb;
  padding:12px;
  border-radius:16px;
  cursor:pointer;
  border:2px solid transparent;
}
.template.active{
  border-color:#2563eb;
  background:white;
}

/* PREVIEW */
.preview{
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}
.preview h1{
  text-align:center;
  margin:0;
}
.preview small{
  display:block;
  text-align:center;
  margin-bottom:20px;
  color:#6b7280;
}
.sec{
  margin-top:14px;
}
.sec-title{
  font-size:12px;
  letter-spacing:.14em;
  font-weight:700;
  border-bottom:1px solid #e5e7eb;
  color:#374151;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:12px;
  color:#6b7280;
  padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="logo"><span>FR</span>FastResume</div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/builder">Builder</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a class="cta" href="/builder">Start free</a>
    </div>
  </div>
</div>

<!-- INTRO PAGE -->
<section id="introPage" class="section hero">
  <h1>Build your <span style="color:#2563eb">AI resume</span> in minutes</h1>
  <p>Fill details calmly. Preview only when you're ready. No clutter.</p>
  <button id="startBtn">Start building</button>
</section>

<!-- FORM PAGE -->
<section id="formPage" class="section hide">
  <div class="card">
    <label>Paste about yourself</label>
    <textarea id="story"></textarea>

    <label>Experience level</label>
    <select id="exp">
      <option value="fresher">Fresher / Student</option>
      <option value="junior">0–2 years</option>
    </select>

    <h3 style="margin-top:20px">Choose template</h3>
    <div class="templates">
      <div class="template active" data-tpl="classic">Classic</div>
      <div class="template" data-tpl="balanced">Balanced</div>
      <div class="template" data-tpl="bold">Bold</div>
    </div>

    <label>Name</label>
    <input id="name">

    <label>Email</label>
    <input id="email">

    <label>Projects</label>
    <textarea id="projects"></textarea>

    <div class="actions">
      <button class="primary" id="reviewBtn">Review Resume →</button>
      <button class="ghost" id="demoBtn">Demo</button>
      <button class="outline" id="clearBtn">Clear</button>
    </div>
  </div>
</section>

<!-- PREVIEW PAGE -->
<section id="previewPage" class="section hide">
  <button class="outline" id="backBtn">← Edit details</button>

  <div class="preview" id="resume">
    <!-- Resume renders here -->
  </div>

  <div class="actions">
    <button class="primary" onclick="window.print()">Print / PDF</button>
  </div>
</section>

<footer>
  © 2025 FastResume • Built by a student
</footer>

<script>
const intro = document.getElementById('introPage');
const form = document.getElementById('formPage');
const previewPage = document.getElementById('previewPage');
const resume = document.getElementById('resume');

startBtn.onclick = () => {
  intro.classList.add('hide');
  form.classList.remove('hide');
};

reviewBtn.onclick = () => {
  render();
  form.classList.add('hide');
  previewPage.classList.remove('hide');
  window.scrollTo(0,0);
};

backBtn.onclick = () => {
  previewPage.classList.add('hide');
  form.classList.remove('hide');
};

function render(){
  resume.innerHTML=`
  <h1>${name.value || 'Your Name'}</h1>
  <small>${email.value || 'email@example.com'}</small>

  <div class="sec">
    <div class="sec-title">Summary</div>
    <p>${story.value || '-'}</p>
  </div>

  <div class="sec">
    <div class="sec-title">Projects</div>
    <p>${projects.value || '-'}</p>
  </div>
  `;
}

demoBtn.onclick = ()=>{
  story.value="B.Tech CSE student with web projects and internships.";
  name.value="Student Name";
  email.value="student@email.com";
  projects.value="AI resume builder, portfolio site";
};

clearBtn.onclick=()=>{
  story.value=name.value=email.value=projects.value="";
};
</script>

</body>
</html>
