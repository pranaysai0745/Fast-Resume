<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FastResume — Auto-build (Groq)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f5fb;
      --card:#ffffff;
      --accent:#2563eb;
      --border:#e2e8f0;
      --muted:#6b7280;
      --text:#0f172a;
      --side:#f3f4f6;
      --line:#111827;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:24px;
      background:var(--bg);
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
    }
    .container{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      gap:24px;
      align-items:flex-start;
    }
    .left,.right{
      background:var(--card);
      border-radius:12px;
      border:1px solid var(--border);
      padding:18px 20px;
    }
    .left{ width:42%; }
    .right{ width:58%; min-height:620px; }

    h1{
      margin:0 0 6px;
      font-size:22px;
      font-weight:800;
    }
    .subtitle{
      font-size:13px;
      color:var(--muted);
      margin-bottom:12px;
    }

    textarea,input,select,button{
      font-family:inherit;
    }

    textarea,input,select{
      width:100%;
      border-radius:8px;
      border:1px solid var(--border);
      padding:8px 10px;
      font-size:13px;
    }
    textarea{ resize:vertical; min-height:80px; }

    label{
      font-size:13px;
      font-weight:600;
      margin:10px 0 4px;
      display:block;
      color:#111827;
    }

    .row{
      display:flex;
      gap:10px;
    }
    .row > *{ flex:1; }

    .btn-row{
      display:flex;
      gap:8px;
      margin-top:10px;
      margin-bottom:6px;
      align-items:center;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:7px 14px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .btn-primary{
      background:var(--accent);
      color:white;
    }
    .btn-ghost{
      background:#e5e7eb;
      color:#111827;
    }
    .btn-outline{
      background:transparent;
      border:1px solid #d1d5db;
      color:#111827;
    }
    .btn:disabled{
      opacity:0.7;
      cursor:default;
    }

    .ats-chip-left{
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
      margin-left:auto;
      white-space:nowrap;
    }

    /* Quick templates row */
    .quick-wrap{
      margin-top:8px;
      margin-bottom:4px;
    }
    .quick-label{
      font-size:11px;
      color:var(--muted);
      margin-bottom:4px;
    }
    .quick-templates{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .qbtn{
      border-radius:999px;
      border:1px solid #d1d5db;
      background:#f9fafb;
      font-size:11px;
      padding:4px 10px;
      cursor:pointer;
      white-space:nowrap;
    }
    .qbtn span{
      display:block;
      font-size:10px;
      color:#6b7280;
      font-weight:500;
    }
    .qbtn-active{
      background:var(--accent);
      border-color:var(--accent);
      color:white;
    }
    .qbtn-active span{
      color:#e5e7eb;
    }

    /* Resume base */
    .resume{
      max-width:720px;
      margin:0 auto;
      font-size:13px;
      color:#111827;
      line-height:1.4;
    }
    .resume-header-name{
      font-size:22px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-align:center;
    }
    .resume-header-sub{
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#4b5563;
      margin-top:2px;
      text-align:center;
    }
    .resume-header-contact{
      font-size:11px;
      color:#4b5563;
      margin-top:4px;
      text-align:center;
    }
    .section{
      margin-top:10px;
    }
    .section-title{
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#4b5563;
      border-bottom:1px solid #e5e7eb;
      padding-bottom:2px;
      margin-bottom:4px;
    }
    .bullet-block{
      white-space:normal;
      line-height:1.45;
      font-size:13px;
    }

    .classic-header{
      border-bottom:2px solid #e5e7eb;
      padding-bottom:6px;
      margin-bottom:6px;
    }

    /* Soft sidebar layout */
    .resume-soft{
      display:grid;
      grid-template-columns:210px 1fr;
      gap:16px;
    }
    .soft-left{
      background:var(--side);
      border-radius:8px;
      padding:10px 12px;
    }
    .soft-left-title{
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#4b5563;
      border-bottom:1px solid #d4d4d8;
      padding-bottom:2px;
      margin-bottom:3px;
    }
    .soft-left-block{ margin-bottom:10px; }
    .soft-left-text{
      font-size:12px;
      line-height:1.45;
    }

    /* Balanced two-column layout */
    .resume-balanced{
      display:grid;
      grid-template-columns:1.1fr 1.2fr;
      gap:14px;
    }

    /* Modern line layout */
    .modern-top-line{
      height:40px;
      border-left:2px solid var(--line);
      margin:0 auto 14px auto;
    }

    /* Photo sidebar layout */
    .resume-photo{
      display:grid;
      grid-template-columns:220px 1fr;
      gap:16px;
    }
    .photo-box{
      background:var(--side);
      border-radius:8px;
      padding:12px 12px 10px 12px;
      text-align:center;
    }
    .photo-img{
      width:96px;
      height:96px;
      border-radius:999px;
      object-fit:cover;
      display:block;
      margin:0 auto 10px auto;
      border:2px solid #e5e7eb;
    }
    .photo-left-title{
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#4b5563;
      border-bottom:1px solid #d4d4d8;
      padding-bottom:2px;
      margin:8px 0 3px;
      text-align:left;
    }
    .photo-left-text{
      font-size:12px;
      text-align:left;
      line-height:1.45;
    }

    /* Bold header style (developerish) */
    .bold-header-bar{
      background:#111827;
      color:white;
      padding:10px 14px;
      border-radius:8px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
    }
    .bold-header-name{
      font-size:20px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .bold-header-role{
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      opacity:0.9;
    }
    .bold-header-contact{
      font-size:11px;
      text-align:right;
      max-width:45%;
    }
    .bold-body-cols{
      display:grid;
      grid-template-columns:1.3fr 1fr;
      gap:14px;
    }

    @media (max-width:960px){
      .container{
        flex-direction:column;
      }
      .left,.right{
        width:100%;
      }
      .resume-soft,
      .resume-balanced,
      .resume-photo,
      .bold-body-cols{
        grid-template-columns:1fr;
      }
      .bold-header-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
      }
      .bold-header-contact{
        text-align:left;
        max-width:100%;
      }
    }

    @media print {
      body{
        background:#ffffff;
        padding:0;
        margin:0;
      }
      .left{
        display:none !important;
      }
      .right{
        border:none;
        width:100%;
        margin:0;
        padding:0;
      }
      .right .resume{
        max-width:100%;
        margin:0;
        padding:24px 40px;
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LEFT PANEL -->
    <div class="left">
      <h1>FastResume — Auto-build</h1>
      <div class="subtitle">
        Paste details once. We auto-generate an ATS-friendly resume.
      </div>

      <label>Paste about yourself</label>
      <textarea id="storyInput" placeholder="I am a CSE student / engineer, know Python, Java, HTML, CSS, SQL, built projects, done internships, have certifications..."></textarea>

      <div class="row">
        <div>
          <label>Experience level</label>
          <select id="experienceSelect">
            <option value="fresher">Fresher / Student</option>
            <option value="junior">0–2 years</option>
            <option value="mid">2+ years</option>
          </select>
        </div>
        <div>
          <label>Choose template</label>
          <select id="templateSelect">
            <option value="classic">Classic Student (single column)</option>
            <option value="softSidebar">Soft Sidebar (2-column)</option>
            <option value="balanced">Balanced Pro (2-column)</option>
            <option value="modernLine">Modern Line (single column)</option>
            <option value="photoSidebar">Photo Sidebar (with picture)</option>
            <option value="compactAts">Compact ATS</option>
            <option value="boldHeader">Bold Header</option>
          </select>
        </div>
      </div>

      <!-- QUICK TEMPLATE BUTTONS -->
      <div class="quick-wrap">
        <div class="quick-label">Quick templates:</div>
        <div class="quick-templates">
          <button type="button" class="qbtn" data-template="classic">
            Classic<br><span>Single column</span>
          </button>
          <button type="button" class="qbtn" data-template="softSidebar">
            Soft Sidebar<br><span>Grey left panel</span>
          </button>
          <button type="button" class="qbtn" data-template="balanced">
            Balanced Pro<br><span>2-column</span>
          </button>
          <button type="button" class="qbtn" data-template="modernLine">
            Modern Line<br><span>Top accent</span>
          </button>
          <button type="button" class="qbtn" data-template="photoSidebar">
            Photo Resume<br><span>With picture</span>
          </button>
          <button type="button" class="qbtn" data-template="compactAts">
            Compact ATS<br><span>Dense single page</span>
          </button>
          <button type="button" class="qbtn" data-template="boldHeader">
            Bold Header<br><span>Developer style</span>
          </button>
        </div>
      </div>

      <div class="btn-row">
        <button id="autoBuildBtn" class="btn btn-primary">Auto Build</button>
        <button id="demoBtn" class="btn btn-ghost" type="button">Demo</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
        <button id="downloadBtn" class="btn btn-outline" type="button">Print / PDF</button>
        <div id="atsLeft" class="ats-chip-left">ATS: 40%</div>
      </div>

      <hr style="margin:12px 0 8px; border:none; border-top:1px dashed #e5e7eb;">

      <div style="font-size:12px; font-weight:600; color:#4b5563; margin-bottom:6px;">
        Or edit fields manually (optional)
      </div>

      <label>Photo (optional)</label>
      <input id="photoInput" type="file" accept="image/*">

      <label>Name</label>
      <input id="nameInput" placeholder="Your full name">

      <label>Email</label>
      <input id="emailInput" placeholder="you@example.com">

      <label>Phone</label>
      <input id="phoneInput" placeholder="+91-XXXXXXXXXX">

      <label>Location</label>
      <input id="locationInput" placeholder="Bengaluru, India">

      <label>Headline</label>
      <input id="headlineInput" placeholder="CS Student / Engineer">

      <label>Summary / Objective</label>
      <textarea id="summaryInput" placeholder="2-3 line professional summary"></textarea>

      <label>Education</label>
      <textarea id="educationInput" placeholder="Degree, College, CGPA, Year etc."></textarea>

      <label>Internships / Experience</label>
      <textarea id="experienceInput" placeholder="Internship / work experience with bullet points"></textarea>

      <label>Projects (1–4 projects with bullets)</label>
      <textarea id="projectsInput" placeholder="Project 1: ...&#10;• Bullet&#10;&#10;Project 2: ..."></textarea>

      <label>Skills — Programming</label>
      <input id="skillsProgInput" placeholder="Python, Java, C">

      <label>Skills — Frontend</label>
      <input id="skillsFrontInput" placeholder="HTML, CSS, React">

      <label>Skills — Databases</label>
      <input id="skillsDbInput" placeholder="MySQL, MongoDB">

      <label>Skills — Other / Tools</label>
      <input id="skillsOtherInput" placeholder="Git, Linux, Docker">

      <label>Skills — Soft skills</label>
      <input id="skillsSoftInput" placeholder="Communication, Teamwork">

      <label>Languages known</label>
      <input id="languagesInput" placeholder="English, Telugu, Kannada">

      <label>Certifications</label>
      <textarea id="certsInput" placeholder="One per line"></textarea>

      <label>Interests / Hobbies</label>
      <textarea id="interestsInput" placeholder="Cricket, hackathons, open source..."></textarea>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <div id="resumePreview" class="resume"></div>
    </div>
  </div>

  <script>
    /* ===== STATE & DOM ===== */
    const state = {
      story: '',
      experienceLevel: 'fresher',
      template: 'classic',
      photoDataUrl: '',

      name:'', email:'', phone:'', location:'', headline:'',
      summary:'', education:'', experience:'', projects:'',
      skillsProgramming:'', skillsFrontend:'', skillsDatabase:'',
      skillsOther:'', skillsSoft:'',
      languages:'', certifications:'', interests:''
    };

    const $ = id => document.getElementById(id);
    const inputs = {
      story: $('storyInput'),
      experience: $('experienceSelect'),
      template: $('templateSelect'),
      photo: $('photoInput'),

      name:$('nameInput'), email:$('emailInput'), phone:$('phoneInput'),
      location:$('locationInput'), headline:$('headlineInput'),
      summary:$('summaryInput'), education:$('educationInput'),
      exp:$('experienceInput'), projects:$('projectsInput'),

      prog:$('skillsProgInput'), front:$('skillsFrontInput'),
      db:$('skillsDbInput'), other:$('skillsOtherInput'),
      soft:$('skillsSoftInput'), lang:$('languagesInput'),
      certs:$('certsInput'), interests:$('interestsInput'),

      ats:$('atsLeft'), preview:$('resumePreview'),

      auto:$('autoBuildBtn'), demo:$('demoBtn'),
      clear:$('clearBtn'), print:$('downloadBtn')
    };
    const quickBtns = Array.from(document.querySelectorAll('.qbtn'));

    /* ===== HELPERS ===== */
    const esc = s => String(s||'').replace(/[&<>]/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
    const clean = s => {
      s = String(s||'').trim();
      if(['','n/a','na','none','nil','no'].includes(s.toLowerCase())) return '';
      return s;
    };

    // Convert newlines and literal "\n" into <br> with escaping
    const formatText = text =>
      esc(text || '')
        .replace(/\\n/g,'<br>')
        .replace(/\n/g,'<br>');

    const sec = (title,content) =>
      content ? `<div class="section">
        <div class="section-title">${title}</div>
        <div class="bullet-block">${formatText(content)}</div>
      </div>` : '';

    function atsScore(){
      let s=40;
      if(state.summary) s+=10;
      if(state.education) s+=15;
      if(state.projects) s+=10;
      if(state.experience) s+=10;
      if(state.languages) s+=5;
      if(state.certifications) s+=5;
      return Math.min(98,s);
    }

    function saveState(){
      localStorage.setItem('fastresume_v2', JSON.stringify(state));
    }

    /* ===== TEMPLATES ===== */
    function tplClassic(d){
      return `
      <div class="classic-header">
        <div class="resume-header-name">${esc(d.name)}</div>
        <div class="resume-header-sub">${esc(d.headline)}</div>
        <div class="resume-header-contact">${esc([d.location,d.phone,d.email].filter(Boolean).join(' · '))}</div>
      </div>
      ${sec('Profile Summary',d.summary)}
      ${sec('Education',d.education)}
      ${sec(d.expLabel,d.experience)}
      ${sec('Projects',d.projects)}
      ${sec('Skills',[
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n'))}
      ${sec('Languages',d.languages)}
      ${sec('Certifications',d.certifications)}
      ${sec('Interests',d.interests)}
      `;
    }

    function tplSoft(d){
      const skillsText = [
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n');

      return `
      <div class="resume-soft">
        <div class="soft-left">
          ${sec('Contact',[d.location,d.phone,d.email].filter(Boolean).join('\n'))}
          ${sec('Skills',skillsText)}
          ${sec('Languages',d.languages)}
          ${sec('Certifications',d.certifications)}
        </div>
        <div>
          <div class="resume-header-name" style="text-align:left">${esc(d.name)}</div>
          <div class="resume-header-sub" style="text-align:left">${esc(d.headline)}</div>
          ${sec('Profile Summary',d.summary)}
          ${sec('Education',d.education)}
          ${sec(d.expLabel,d.experience)}
          ${sec('Projects',d.projects)}
        </div>
      </div>`;
    }

    function tplBalanced(d){
      const skillsText = [
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n');

      return `
      <div class="resume-balanced">
        <div>
          <div class="resume-header-name" style="text-align:left">${esc(d.name)}</div>
          <div class="resume-header-sub" style="text-align:left">${esc(d.headline)}</div>
          ${sec('Profile Summary',d.summary)}
          ${sec(d.expLabel,d.experience)}
          ${sec('Education',d.education)}
        </div>
        <div>
          ${sec('Projects',d.projects)}
          ${sec('Skills',skillsText)}
          ${sec('Languages',d.languages)}
          ${sec('Certifications',d.certifications)}
          ${sec('Interests',d.interests)}
        </div>
      </div>`;
    }

    function tplModern(d){
      const skillsText = [
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n');

      return `
      <div class="modern-top-line"></div>
      <div class="resume-header-name">${esc(d.name)}</div>
      <div class="resume-header-sub">${esc(d.headline)}</div>
      <hr>
      ${sec('About Me',d.summary)}
      <div class="resume-balanced">
        ${sec('Education',d.education)}
        ${sec(d.expLabel,d.experience)}
      </div>
      ${sec('Projects',d.projects)}
      ${sec('Skills',skillsText)}
      ${sec('Languages',d.languages)}
      ${sec('Achievements / Certifications',d.certifications)}
      `;
    }

    function tplPhoto(d){
      if(!d.photoDataUrl) return tplClassic(d);
      const skillsText = [
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n');

      return `
      <div class="resume-photo">
        <div class="photo-box">
          <img src="${d.photoDataUrl}" class="photo-img" alt="Photo">
          <div style="font-weight:700">${esc(d.name)}</div>
          <div class="resume-header-sub">${esc(d.headline)}</div>
          <div class="photo-left-title">Contact</div>
          <div class="photo-left-text">${formatText([d.phone,d.email,d.location].filter(Boolean).join('\n'))}</div>
          ${d.languages ? `<div class="photo-left-title">Languages</div><div class="photo-left-text">${formatText(d.languages)}</div>`:''}
          ${skillsText ? `<div class="photo-left-title">Skills</div><div class="photo-left-text">${formatText(skillsText)}</div>`:''}
          ${d.certifications ? `<div class="photo-left-title">Certifications</div><div class="photo-left-text">${formatText(d.certifications)}</div>`:''}
        </div>
        <div>
          ${sec('Profile Summary',d.summary)}
          ${sec('Education',d.education)}
          ${sec(d.expLabel,d.experience)}
          ${sec('Projects',d.projects)}
        </div>
      </div>`;
    }

    function tplBold(d){
      const skillsText = [
        d.skillsProgramming && 'Programming: '+d.skillsProgramming,
        d.skillsFrontend && 'Frontend: '+d.skillsFrontend,
        d.skillsDatabase && 'Databases: '+d.skillsDatabase,
        d.skillsOther && 'Tools: '+d.skillsOther,
        d.skillsSoft && 'Soft Skills: '+d.skillsSoft
      ].filter(Boolean).join('\n');

      return `
      <div>
        <div class="bold-header-bar">
          <div>
            <div class="bold-header-name">${esc(d.name)}</div>
            <div class="bold-header-role">${esc(d.headline)}</div>
          </div>
          <div class="bold-header-contact">
            ${esc([d.email,d.phone,d.location].filter(Boolean).join(' · '))}
          </div>
        </div>
        <div class="bold-body-cols">
          <div>
            ${sec('Profile Summary',d.summary)}
            ${sec(d.expLabel,d.experience)}
            ${sec('Projects',d.projects)}
          </div>
          <div>
            ${sec('Education',d.education)}
            ${sec('Skills',skillsText)}
            ${sec('Languages',d.languages)}
            ${sec('Certifications',d.certifications)}
            ${sec('Interests',d.interests)}
          </div>
        </div>
      </div>`;
    }

    const tplMap = {
      classic: tplClassic,
      softSidebar: tplSoft,
      balanced: tplBalanced,
      modernLine: tplModern,
      photoSidebar: tplPhoto,
      compactAts: tplClassic,  // can customise later
      boldHeader: tplBold
    };

    /* ===== RENDER ===== */
    function render(){
      const data = {
        ...state,
        name: state.name || 'Your Name',
        email: state.email || 'your.email@example.com',
        headline: state.headline || (state.experienceLevel==='fresher'
          ? 'CS STUDENT'
          : 'SOFTWARE ENGINEER'),
        expLabel: state.experienceLevel==='fresher'
          ? 'Internships / Experience'
          : 'Professional Experience'
      };

      const tpl = tplMap[state.template] || tplClassic;
      inputs.preview.innerHTML = tpl(data);
      inputs.ats.textContent = `ATS: ${atsScore()}%`;

      // quick template highlight
      quickBtns.forEach(btn=>{
        btn.classList.toggle('qbtn-active', btn.dataset.template === state.template);
      });

      saveState();
    }

    /* ===== SYNC FROM INPUTS ===== */
    function syncFromInputs(){
      state.story = clean(inputs.story.value);
      state.name = clean(inputs.name.value);
      state.email = clean(inputs.email.value);
      state.phone = clean(inputs.phone.value);
      state.location = clean(inputs.location.value);
      state.headline = clean(inputs.headline.value);
      state.summary = clean(inputs.summary.value);
      state.education = clean(inputs.education.value);
      state.experience = clean(inputs.exp.value);
      state.projects = clean(inputs.projects.value);
      state.skillsProgramming = clean(inputs.prog.value);
      state.skillsFrontend  = clean(inputs.front.value);
      state.skillsDatabase  = clean(inputs.db.value);
      state.skillsOther     = clean(inputs.other.value);
      state.skillsSoft      = clean(inputs.soft.value);
      state.languages       = clean(inputs.lang.value);
      state.certifications  = clean(inputs.certs.value);
      state.interests       = clean(inputs.interests.value);
      render();
    }

    [
      inputs.story, inputs.name, inputs.email, inputs.phone, inputs.location,
      inputs.headline, inputs.summary, inputs.education, inputs.exp,
      inputs.projects, inputs.prog, inputs.front, inputs.db, inputs.other,
      inputs.soft, inputs.lang, inputs.certs, inputs.interests
    ].forEach(el => el.addEventListener('input', syncFromInputs));

    inputs.experience.addEventListener('change', () => {
      state.experienceLevel = inputs.experience.value;
      render();
    });

    inputs.template.addEventListener('change', () => {
      state.template = inputs.template.value;
      render();
    });

    quickBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        const t = btn.dataset.template;
        state.template = t;
        inputs.template.value = t;
        render();
      });
    });

    /* ===== PHOTO UPLOAD ===== */
    inputs.photo.addEventListener('change', () => {
      const file = inputs.photo.files && inputs.photo.files[0];
      if (!file){
        state.photoDataUrl = '';
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = e => {
        state.photoDataUrl = e.target.result;
        render();
      };
      reader.readAsDataURL(file);
    });

    /* ===== AUTO BUILD (GROQ) ===== */
    inputs.auto.addEventListener('click', async () => {
      const text = inputs.story.value.trim();
      if (!text){
        alert('Please paste one paragraph about yourself first.');
        return;
      }
      inputs.auto.disabled = true;
      inputs.auto.textContent = 'Building...';
      try{
        const res = await fetch('/api/build',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ text, experienceLevel: state.experienceLevel })
        });
        if(!res.ok){
          const err = await res.json().catch(()=>({error:'Unknown error'}));
          alert('Server error: '+(err.error||res.status));
        }else{
          const d = await res.json();
          Object.keys(d).forEach(k=>{
            if(d[k]){
              state[k] = clean(d[k]);
              switch(k){
                case 'name': inputs.name.value=state.name;break;
                case 'email': inputs.email.value=state.email;break;
                case 'phone': inputs.phone.value=state.phone;break;
                case 'location': inputs.location.value=state.location;break;
                case 'headline': inputs.headline.value=state.headline;break;
                case 'summary': inputs.summary.value=state.summary;break;
                case 'education': inputs.education.value=state.education;break;
                case 'experience': inputs.exp.value=state.experience;break;
                case 'projects': inputs.projects.value=state.projects;break;
                case 'skillsProgramming': inputs.prog.value=state.skillsProgramming;break;
                case 'skillsFrontend': inputs.front.value=state.skillsFrontend;break;
                case 'skillsDatabase': inputs.db.value=state.skillsDatabase;break;
                case 'skillsOther': inputs.other.value=state.skillsOther;break;
                case 'skillsSoft': inputs.soft.value=state.skillsSoft;break;
                case 'languages': inputs.lang.value=state.languages;break;
                case 'certifications': inputs.certs.value=state.certifications;break;
                case 'interests': inputs.interests.value=state.interests;break;
              }
            }
          });
          render();
        }
      }catch(e){
        console.error(e);
        alert('Auto-build failed: '+e.message);
      }finally{
        inputs.auto.disabled=false;
        inputs.auto.textContent='Auto Build';
      }
    });

    /* ===== DEMO / CLEAR / PRINT ===== */
    inputs.demo.addEventListener('click', () => {
      inputs.story.value =
`I am a B.Tech CSE student at JSSSTU with CGPA 7.8.
I know Python, Java, HTML, CSS, JavaScript, SQL and basics of machine learning.
I built a bilingual voice chatbot using RAG with FAISS vector DB and a house construction management system website.
I completed a web development internship and have NPTEL and Coursera certifications.
I speak English, Telugu and Kannada and I am interested in web development and hackathons.`;
      syncFromInputs();
    });

    inputs.clear.addEventListener('click', () => {
      Object.keys(state).forEach(k=>{
        if(k==='experienceLevel') state[k]='fresher';
        else if(k==='template') state[k]='classic';
        else if(k==='photoDataUrl') state[k]='';
        else state[k]='';
      });
      Object.values(inputs).forEach(el=>{
        if(!el || !('value' in el)) return;
        if(el===inputs.experience) el.value='fresher';
        else if(el===inputs.template) el.value='classic';
        else el.value='';
      });
      inputs.photo.value='';
      localStorage.removeItem('fastresume_v2');
      render();
    });

    inputs.print.addEventListener('click', () => window.print());

    /* ===== INIT: LOAD FROM LOCALSTORAGE ===== */
    (function init(){
      const saved = localStorage.getItem('fastresume_v2');
      if(saved){
        try{
          const obj = JSON.parse(saved);
          Object.assign(state,obj);
        }catch(e){}
      }
      // push state -> inputs
      inputs.story.value = state.story || '';
      inputs.experience.value = state.experienceLevel || 'fresher';
      inputs.template.value = state.template || 'classic';
      inputs.name.value = state.name;
      inputs.email.value = state.email;
      inputs.phone.value = state.phone;
      inputs.location.value = state.location;
      inputs.headline.value = state.headline;
      inputs.summary.value = state.summary;
      inputs.education.value = state.education;
      inputs.exp.value = state.experience;
      inputs.projects.value = state.projects;
      inputs.prog.value = state.skillsProgramming;
      inputs.front.value = state.skillsFrontend;
      inputs.db.value = state.skillsDatabase;
      inputs.other.value = state.skillsOther;
      inputs.soft.value = state.skillsSoft;
      inputs.lang.value = state.languages;
      inputs.certs.value = state.certifications;
      inputs.interests.value = state.interests;
      render();
    })();
  </script>
</body>
</html>
